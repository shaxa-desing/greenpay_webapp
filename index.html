<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
    background: #0f172a;
    font-family: Arial;
    color: white;
    padding: 20px;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}
button {
    background: #22c55e;
    color: white;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="card">
<h2>🌳 Daraxt ekish</h2>

<input id="tree_type" placeholder="Daraxt turi">
<input id="location" placeholder="Joylashuv">
<input type="file" id="image" accept="image/*">
<button onclick="sendData()">Yuborish</button>
</div>

<script>
const tg = window.Telegram.WebApp;
const API_URL = "https://greenpaybackend-production.up.railway.app";

async function sendData() {

    const formData = new FormData();
    formData.append("user_id", tg.initDataUnsafe.user.id);
    formData.append("user_name", tg.initDataUnsafe.user.first_name);
    formData.append("tree_type", document.getElementById("tree_type").value);
    formData.append("location", document.getElementById("location").value);
    formData.append("latitude", 0);
    formData.append("longitude", 0);
    formData.append("file", document.getElementById("image").files[0]);

    await fetch(API_URL + "/trees/", {
        method: "POST",
        body: formData
    });

    tg.close();
}
</script>

</body>
</html>
