<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GreenPay</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
    font-family: Arial;
    padding:15px;
    background:#f5f5f5;
}

input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#2ecc71;
    color:white;
    font-weight:bold;
    border:none;
}

#map{
    height:250px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🌳 Daraxt ekish</h2>

<input id="tree_type" placeholder="Daraxt turi">
<input id="location" placeholder="Joy nomi">
<input type="file" id="image" accept="image/*">

<div id="map"></div>

<button onclick="sendData()">Yuborish</button>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    console.log("Telegram:", tg);

    window.latitude = 41.3111;
    window.longitude = 69.2797;

    const map = L.map('map').setView([latitude, longitude], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let marker = L.marker([latitude, longitude]).addTo(map);

    map.on('click', function(e){
        latitude = e.latlng.lat;
        longitude = e.latlng.lng;
        marker.setLatLng(e.latlng);
    });

    window.sendData = async function(){

        const user = tg.initDataUnsafe?.user;

        if(!user){
            alert("Telegram ichida oching!");
            return;
        }

        const file = document.getElementById("image").files[0];

        if(!file){
            alert("Rasm yuklang!");
            return;
        }

        const formData = new FormData();
        formData.append("user_id", user.id);
        formData.append("user_name", user.first_name || "User");
        formData.append("tree_type", document.getElementById("tree_type").value);
        formData.append("location", document.getElementById("location").value);
        formData.append("latitude", latitude);
        formData.append("longitude", longitude);
        formData.append("file", file);

        try{
            const res = await fetch("https://greenpaybackend-production.up.railway.app/trees/",{
                method:"POST",
                body:formData
            });

            if(res.ok){
                alert("Yuborildi!");
                tg.close();
            }else{
                alert("Server xato berdi");
            }

        }catch(err){
            alert("Backendga ulanib bo‘lmadi");
            console.log(err);
        }

    }

});
</script>

</body>
</html>
