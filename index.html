<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{font-family:Arial;text-align:center;padding:20px;}
button{padding:10px;margin:10px;background:#2e7d32;color:white;border:none;}
</style>
</head>

<body>

<h2>🌳 Daraxt Ekish</h2>

<input id="treeType" placeholder="Daraxt turi"><br>
<input id="locationText" placeholder="Joy nomi"><br>

<button onclick="getLocation()">📍 Joyni tanlash</button>
<button onclick="sendData()">Yuborish</button>

<script>

let latitude=0;
let longitude=0;

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
latitude=pos.coords.latitude;
longitude=pos.coords.longitude;
alert("Joy tanlandi");
});
}

function sendData(){

const data={
tree_type:treeType.value,
location:locationText.value,
latitude:latitude,
longitude:longitude
};

Telegram.WebApp.sendData(JSON.stringify(data));
Telegram.WebApp.close();

}

</script>

</body>
</html>
