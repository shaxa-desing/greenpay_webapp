<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:30px;
background:#f4f4f4;
}

button{
padding:15px;
font-size:18px;
border:none;
background:#2ecc71;
color:white;
border-radius:10px;
width:100%;
}

input{
margin-top:20px;
}
</style>

</head>

<body>

<h2>🌳 Daraxt rasmini yuborish</h2>

<input type="file" id="photo" accept="image/*" capture="environment">

<br><br>

<button onclick="sendPhoto()">Yuborish</button>

<script>

const tg = window.Telegram.WebApp
tg.ready()

function sendPhoto(){

const file = document.getElementById("photo").files[0]

if(!file){
alert("Rasm tanlang")
return
}

tg.sendData("photo_taken")

tg.close()

}

</script>

</body>
</html>
