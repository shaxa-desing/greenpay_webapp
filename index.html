<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenPay</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

input{
    background:#334155;
    color:white;
}

button{
    background:#22c55e;
    color:white;
    font-weight:bold;
}

#map{
    height:250px;
    border-radius:15px;
    margin-top:15px;
}
.preview{
    width:100%;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h2>🌳 Daraxt ekish</h2>

<input id="tree_type" placeholder="Daraxt turi">
<input id="location" placeholder="Joylashuv">
<input type="file" id="image" accept="image/*">
<img id="preview" class="preview" style="display:none;">

<div id="map"></div>

<button onclick="sendData()">Yuborish</button>
</div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const API_URL = "https://greenpaybackend-production.up.railway.app";

let latitude = 41.3111;
let longitude = 69.2797;

const map = L.map('map').setView([latitude, longitude], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

let marker = L.marker([latitude, longitude], {draggable:true}).addTo(map);

marker.on('dragend', function(e){
    let pos = marker.getLatLng();
    latitude = pos.lat;
    longitude = pos.lng;
});

if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
        map.setView([latitude, longitude], 15);
        marker.setLatLng([latitude, longitude]);
    });
}

document.getElementById("image").addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            const img = document.getElementById("preview");
            img.src = e.target.result;
            img.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
});

async function sendData(){

    if(!tg.initDataUnsafe || !tg.initDataUnsafe.user){
        alert("Telegram ichida oching!");
        return;
    }

    const fileInput = document.getElementById("image").files[0];

    if(!fileInput){
        alert("Rasm yuklang!");
        return;
    }

    const formData = new FormData();
    formData.append("user_id", tg.initDataUnsafe.user.id);
    formData.append("user_name", tg.initDataUnsafe.user.first_name || "User");
    formData.append("tree_type", document.getElementById("tree_type").value);
    formData.append("location", document.getElementById("location").value);
    formData.append("latitude", latitude);
    formData.append("longitude", longitude);
    formData.append("file", fileInput);

    try{
        const res = await fetch(API_URL + "/trees/", {
            method:"POST",
            body:formData
        });

        if(res.ok){
            alert("Yuborildi!");
            tg.close();
        }else{
            alert("Server xato berdi");
        }

    }catch(err){
        alert("Backendga ulanib bo‘lmadi");
        console.log(err);
    }
}
    

</script>

</body>
</html>
